# Render.com: New Web Service → Connect this GitHub repo → Render reads this file (optional).
# GitHub only stores code; Render builds and runs the app.
services:
  - type: web
    name: diabetes-risk-dash
    runtime: python
    # Training runs during build. If the CSV is not in the repo, set DATASET_URL in Render env vars.
    buildCommand: pip install -r requirements.txt && python SRC/prepare_data.py && python SRC/train.py
    # Free tier (~512MB RAM): use 1 worker — each worker loads the full model in memory.
    startCommand: gunicorn wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 1 --timeout 180
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATASET_URL
        sync: false
      - key: ENABLE_SHAP
        value: "false"
